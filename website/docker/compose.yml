# The Burro - Docker Compose Configuration
# Production deployment for bigbendburro.vcetexas.com

services:
  burro-app:
    build:
      context: ../..
      dockerfile: website/docker/Dockerfile
    container_name: burro-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    env_file:
      - .env
    networks:
      omega-net:
        aliases:
          - host.docker.internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  omega-net:
    external: true
